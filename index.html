<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สูตรรูเล็ต</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2D3C59">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roulette">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <h1>สูตร Roulette</h1>
  <p class="subtitle">คลิคตัวออกล่าสุด แทงตามไฮไลต์เขียว</p>

  <div class="status" id="status">
    <div class="label">กรุณากดเลขที่ออก</div>
  </div>

  <div class="board">
    <div class="row-zero">
      <button class="num-btn green zero" data-n="0" onclick="select(0)">0</button>
    </div>
    <div class="grid-36" id="grid36"></div>
  </div>

  <div class="actions">
    <button class="btn-clear" onclick="clearSelection()">ล้าง</button>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:#dc2626"></span>แดง</span>
    <span><span class="dot" style="background:#111"></span>ดำ</span>
    <span><span class="dot" style="background:#16a34a"></span>เขียว</span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
